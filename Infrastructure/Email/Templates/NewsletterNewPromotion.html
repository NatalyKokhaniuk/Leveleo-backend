<!DOCTYPE html>
<html>
<body style='font-family: Arial, sans-serif; background: #f4f4f4; padding: 30px;'>
    <div style='max-width: 600px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);'>
        <h1 style='color: #ef4444; text-align: center;'>🔥 Гаряча акція!</h1>
        
        <div style='background: #fef2f2; padding: 30px; border-radius: 8px; margin: 20px 0; text-align: center; border: 3px dashed #ef4444;'>
            <h2 style='color: #ef4444; margin: 0 0 10px 0;'>{{PROMOTION_NAME}}</h2>
            <p style='font-size: 16px; color: #444;'>{{PROMOTION_DESCRIPTION}}</p>
            
            <div style='margin: 20px 0;'>
                <p style='font-size: 18px; color: #666; margin: 0;'>Знижка до:</p>
                <p style='font-size: 48px; color: #ef4444; font-weight: bold; margin: 10px 0;'>{{DISCOUNT_PERCENTAGE}}</p>
            </div>
            
            <p style='font-size: 14px; color: #666;'>
                ⏰ Акція діє до: <strong>{{VALID_UNTIL}}</strong>
            </p>
        </div>
        
        <div style='margin: 30px 0; text-align: center;'>
            <a href='{{PROMOTION_LINK}}' style='background: #ef4444; color: white; padding: 14px 32px; text-decoration: none; border-radius: 8px; font-size: 16px; font-weight: bold; display: inline-block;'>
                Переглянути акційні товари
            </a>
        </div>
        
        <p style='font-size: 14px; color: #666; text-align: center; background: #fff7ed; padding: 15px; border-radius: 8px;'>
            💡 <strong>Підказка:</strong> Додайте товари в кошик прямо зараз, щоб не пропустити вигідну ціну!
        </p>
        
        <hr style='border: 0; border-top: 1px solid #eee; margin: 30px 0;'>
        
        <p style='color: #888; font-size: 12px; text-align: center;'>
            <a href='{{UNSUBSCRIBE_LINK}}' style='color: #888;'>Відписатися від розсилки</a>
        </p>
        
        <p style='color: #888; font-size: 14px; text-align: center;'>З повагою,<br>Команда LeveLEO 🎸</p>
    </div>
</body>
</html>
