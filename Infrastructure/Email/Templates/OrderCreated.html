<!DOCTYPE html>
<html>
<body style='font-family: Arial, sans-serif; background: #f4f4f4; padding: 30px;'>
    <div style='max-width: 600px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);'>
        <h1 style='color: #2563eb; text-align: center;'>🎉 Замовлення створено!</h1>
        <p style='font-size: 16px; color: #444;'>Дякуємо за ваше замовлення!</p>
        
        <div style='background: #f8fafc; padding: 20px; border-radius: 8px; margin: 20px 0;'>
            <p style='margin: 8px 0; font-size: 14px;'><strong>Номер замовлення:</strong> {{ORDER_NUMBER}}</p>
            <p style='margin: 8px 0; font-size: 14px;'><strong>Сума до оплати:</strong> <span style='color: #2563eb; font-size: 18px; font-weight: bold;'>{{TOTAL_PAYABLE}}</span></p>
        </div>
        
        <p style='font-size: 15px; color: #444;'>Будь ласка, завершіть оплату для обробки замовлення.</p>
        
        <div style='margin: 30px 0; text-align: center;'>
            <a href='{{ORDER_LINK}}' style='background: #2563eb; color: white; padding: 14px 32px; text-decoration: none; border-radius: 8px; font-size: 16px; font-weight: bold; display: inline-block;'>
                Переглянути замовлення
            </a>
        </div>
        
        <hr style='border: 0; border-top: 1px solid #eee; margin: 40px 0;'>
        <p style='color: #888; font-size: 14px; text-align: center;'>З повагою,<br>Команда LeveLEO 🎸</p>
    </div>
</body>
</html>
