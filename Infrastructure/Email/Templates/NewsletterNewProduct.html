<!DOCTYPE html>
<html>
<body style='font-family: Arial, sans-serif; background: #f4f4f4; padding: 30px;'>
    <div style='max-width: 600px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);'>
        <h1 style='color: #8b5cf6; text-align: center;'>🎉 Новинка в каталозі!</h1>
        
        <div style='text-align: center; margin: 30px 0;'>
            <img src='{{PRODUCT_IMAGE}}' alt='{{PRODUCT_NAME}}' style='max-width: 100%; height: auto; border-radius: 8px;' />
        </div>
        
        <h2 style='color: #333; text-align: center;'>{{PRODUCT_NAME}}</h2>
        
        <p style='font-size: 16px; color: #444; text-align: center;'>{{PRODUCT_DESCRIPTION}}</p>
        
        <div style='background: #faf5ff; padding: 20px; border-radius: 8px; margin: 20px 0; text-align: center; border-left: 4px solid #8b5cf6;'>
            <p style='font-size: 14px; color: #666; margin: 0 0 10px 0;'>Ціна:</p>
            <p style='font-size: 28px; color: #8b5cf6; font-weight: bold; margin: 0;'>{{PRODUCT_PRICE}}</p>
        </div>
        
        <div style='margin: 30px 0; text-align: center;'>
            <a href='{{PRODUCT_LINK}}' style='background: #8b5cf6; color: white; padding: 14px 32px; text-decoration: none; border-radius: 8px; font-size: 16px; font-weight: bold; display: inline-block;'>
                Переглянути товар
            </a>
        </div>
        
        <p style='font-size: 14px; color: #666; text-align: center;'>
            ⚡ Поспішайте! Кількість обмежена.
        </p>
        
        <hr style='border: 0; border-top: 1px solid #eee; margin: 30px 0;'>
        
        <p style='color: #888; font-size: 12px; text-align: center;'>
            <a href='{{UNSUBSCRIBE_LINK}}' style='color: #888;'>Відписатися від розсилки</a>
        </p>
        
        <p style='color: #888; font-size: 14px; text-align: center;'>З повагою,<br>Команда LeveLEO 🎸</p>
    </div>
</body>
</html>
